<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terminalz</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="node_modules/xterm/css/xterm.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-label">terminalz</div>
    <div id="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize">&#x2013;</button>
      <button class="titlebar-btn" id="btn-maximize">&#x25A1;</button>
      <button class="titlebar-btn titlebar-btn-close" id="btn-close">&#x2715;</button>
    </div>
  </div>
  <canvas id="matrix-rain"></canvas>
  <div id="grid">
    <div class="terminal-cell" id="terminal-0">
      <div class="terminal-label"><span class="label-num">1</span><span class="label-name">shell</span></div>
    </div>
    <div class="terminal-cell" id="terminal-1">
      <div class="terminal-label"><span class="label-num">2</span><span class="label-name">shell</span></div>
    </div>
    <div class="terminal-cell" id="terminal-2">
      <div class="terminal-label"><span class="label-num">3</span><span class="label-name">shell</span></div>
    </div>
    <div class="terminal-cell" id="terminal-3">
      <div class="terminal-label"><span class="label-num">4</span><span class="label-name">shell</span></div>
    </div>
    <div class="terminal-cell" id="terminal-4">
      <div class="terminal-label"><span class="label-num">5</span><span class="label-name">shell</span></div>
    </div>
    <div class="terminal-cell" id="terminal-5">
      <div class="terminal-label"><span class="label-num">6</span><span class="label-name">shell</span></div>
    </div>
  </div>
  <script src="node_modules/xterm/lib/xterm.js"></script>
  <script src="node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="node_modules/xterm-addon-webgl/lib/xterm-addon-webgl.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
