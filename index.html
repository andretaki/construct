<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Construct</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="node_modules/xterm/css/xterm.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-label">Construct</div>
    <div id="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize">&#x2013;</button>
      <button class="titlebar-btn" id="btn-maximize">&#x25A1;</button>
      <button class="titlebar-btn titlebar-btn-close" id="btn-close">&#x2715;</button>
    </div>
  </div>
  <div id="broadcast-bar">BROADCAST MODE — typing in all terminals</div>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Search terminal..." spellcheck="false" />
    <span id="search-close">&#x2715;</span>
  </div>
  <div id="snippet-palette">
    <input id="snippet-input" type="text" placeholder="Type command or search snippets..." spellcheck="false" />
    <div id="snippet-list"></div>
  </div>
  <div id="snippet-overlay"></div>
  <canvas id="matrix-rain"></canvas>
  <div id="grid">
    <div class="terminal-cell" id="terminal-0">
      <div class="terminal-label"><span class="label-num">1</span><span class="label-name">shell</span><span class="label-lock" style="display:none">&#x1F512;</span></div>
    </div>
    <div class="terminal-cell" id="terminal-1">
      <div class="terminal-label"><span class="label-num">2</span><span class="label-name">shell</span><span class="label-lock" style="display:none">&#x1F512;</span></div>
    </div>
    <div class="terminal-cell" id="terminal-2">
      <div class="terminal-label"><span class="label-num">3</span><span class="label-name">shell</span><span class="label-lock" style="display:none">&#x1F512;</span></div>
    </div>
    <div class="terminal-cell" id="terminal-3">
      <div class="terminal-label"><span class="label-num">4</span><span class="label-name">shell</span><span class="label-lock" style="display:none">&#x1F512;</span></div>
    </div>
    <div class="terminal-cell" id="terminal-4">
      <div class="terminal-label"><span class="label-num">5</span><span class="label-name">shell</span><span class="label-lock" style="display:none">&#x1F512;</span></div>
    </div>
    <div class="terminal-cell" id="terminal-5">
      <div class="terminal-label"><span class="label-num">6</span><span class="label-name">shell</span><span class="label-lock" style="display:none">&#x1F512;</span></div>
    </div>
  </div>
  <script src="node_modules/xterm/lib/xterm.js"></script>
  <script src="node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="node_modules/xterm-addon-webgl/lib/xterm-addon-webgl.js"></script>
  <script src="node_modules/xterm-addon-search/lib/xterm-addon-search.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
